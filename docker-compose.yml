# ./docker-compose.yml
services:
  db:
    container_name: tsugi_db
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: tsugi_root_pw
      MYSQL_DATABASE: tsugi
      MYSQL_USER: ltiuser
      MYSQL_PASSWORD: ltipassword
    ports:
      - "33306:3306"
    volumes:
      - ./.docker_data/mysql:/var/lib/mysql:delegated
  web:
    container_name: tsugi_web
    build:
        context: .
    depends_on:
      - db
    environment:
      TSUGI_ADMIN_PW: ${TSUGI_ADMIN_PW:-}
      TSUGI_PDO: ${TSUGI_PDO:-}
      TSUGI_DB_USER: ${TSUGI_DB_USER:-}
      TSUGI_DB_PASS: ${TSUGI_DB_PASS:-}
      TSUGI_WWWROOT: ${TSUGI_WWWROOT:-}
      TSUGI_APPHOME: ${TSUGI_APPHOME:-}
    volumes:
      # Bind-mount the tree for dev; overlay config.php with a stub that requires
      # config-dist.php (avoids host secrets/MAMP settings). File bind mounts work
      # reliably across Docker Desktop platforms; anonymous volumes on a single file do not.
      - .:/var/www/html/tsugi:delegated
      - ./docker/tsugi-docker-config.php:/var/www/html/tsugi/config.php:ro
    ports:
      # Host port (CI and docs default to 8888). Override locally, e.g. TSUGI_HOST_PORT=8000, to avoid MAMP.
      - "${TSUGI_HOST_PORT:-8888}:80"
    command: bash -c "./tsugi/docker-compose-init.sh"
    stdin_open: true
    tty: true
